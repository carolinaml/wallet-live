<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #010a27;
            --panel-bg: rgba(255, 255, 255, 0.045);
            --line-soft: rgba(255, 255, 255, 0.1);
            --text-soft: rgba(220, 234, 255, 0.88);
            --text-faint: rgba(190, 210, 240, 0.42);
            --accent: #2dc6ff;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Space Mono', monospace;
            background:
                radial-gradient(circle at 50% 46%, rgba(45, 198, 255, 0.08), transparent 22%),
                radial-gradient(circle at 12% 10%, rgba(45, 198, 255, 0.05), transparent 24%),
                var(--bg-main);
            color: var(--text-soft);
        }

        .login-shell {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: var(--panel-bg);
            border: 1px solid var(--line-soft);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 0 34px rgba(13, 184, 240, 0.11);
            backdrop-filter: blur(7px);
        }

        .form-control.login-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 0.75rem;
            color: var(--text-soft);
            padding-top: 0.72rem;
            padding-bottom: 0.72rem;
            font-size: 0.95rem;
        }

        .form-control.login-input::placeholder {
            color: var(--text-faint);
            text-transform: lowercase;
        }

        .form-control.login-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(45, 198, 255, 0.45);
            box-shadow: 0 0 0 0.2rem rgba(45, 198, 255, 0.16);
            color: var(--text-soft);
        }

        .btn-login {
            width: 100%;
            border-radius: 0.75rem;
            border: 1px solid rgba(45, 198, 255, 0.4);
            background: rgba(45, 198, 255, 0.18);
            color: #96edff;
            text-transform: lowercase;
            letter-spacing: 0.03em;
            padding-top: 0.72rem;
            padding-bottom: 0.72rem;
        }

        .btn-login:hover,
        .btn-login:focus {
            background: rgba(45, 198, 255, 0.3);
            color: #c9f7ff;
            border-color: rgba(45, 198, 255, 0.56);
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <div class="login-card">
            <form method="POST" action="/login" class="d-grid gap-3">
                <input
                    type="text"
                    name="username"
                    placeholder="username"
                    required
                    autocomplete="username"
                    class="form-control login-input"
                >
                <input
                    type="password"
                    name="password"
                    placeholder="password"
                    required
                    autocomplete="current-password"
                    class="form-control login-input"
                >
                <button type="submit" class="btn btn-login">submit</button>
            </form>
        </div>
    </main>
</body>
</html>
